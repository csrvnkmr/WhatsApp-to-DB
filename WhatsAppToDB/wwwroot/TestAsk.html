<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .chat-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #responseArea { white-space: pre-wrap; background: #f1f1f1; padding: 15px; border-radius: 5px; min-height: 100px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="chat-container">
        <h3 class="text-center">ERP AI Login</h3>
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" value="csrvn">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" value="password123">
        </div>
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
    </div>

    <div id="chatSection" class="chat-container hidden">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Ask the Agent</h3>
            <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
        </div>
        <div class="mb-3">
            <textarea id="question" class="form-control" rows="3" placeholder="What are my phone number and email?"></textarea>
        </div>
        <button id="btnAsk" class="btn btn-success w-100" onclick="askQuestion()">Send Question</button>
        
        <hr>
        <h5>Response:</h5>
        <div id="responseArea">Answers will appear here...</div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:3000"; // Update with your actual Port

    async function login() {
        const payload = { 
            Username: document.getElementById('username').value, 
            Password: document.getElementById('password').value 
        };

        try {
            const response = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('ai_token', data.token);
                showChat();
            } else {
                alert("Login failed. Check username/password.");
            }
        } catch (err) {
            console.error(err);
            alert("Error connecting to server.");
        }
    }

    async function askQuestion() {
        const token = localStorage.getItem('ai_token');
        const question = document.getElementById('question').value;
        const responseArea = document.getElementById('responseArea');
        const btn = document.getElementById('btnAsk');

        if (!question) return;

        responseArea.innerText = "Analyzing request... 🔍";
        btn.disabled = true;

        try {
            const response = await fetch(`${API_BASE}/ask`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Token: token, Question: question })
            });

            if (response.ok) {
                const data = await response.json();
                responseArea.innerText = data.response;
            } else {
                responseArea.innerText = "Error: Unauthorized or server error.";
            }
        } catch (err) {
            responseArea.innerText = "Connection error.";
        } finally {
            btn.disabled = false;
        }
    }

    function showChat() {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('chatSection').classList.remove('hidden');
    }

    function logout() {
        localStorage.removeItem('ai_token');
        location.reload();
    }

    // Check if already logged in
    if (localStorage.getItem('ai_token')) {
        showChat();
    }
</script>

</body>
</html>
